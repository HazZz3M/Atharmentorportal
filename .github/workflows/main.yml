name: CI/CD Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      # Note: Automatic deployment steps can be added here.
      # For GitHub Pages, you would uncomment the following:
      # - name: Deploy to GitHub Pages
      #   if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      #   uses: JamesIves/github-pages-deploy-action@v4
      #   with:
      #     folder: dist
